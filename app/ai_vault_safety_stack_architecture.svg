<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
</style>

<text class="th" x="340" y="24" text-anchor="middle" fill="#2C2C2A">AI vault safety stack — 6 layers</text>
<text class="ts" x="340" y="42" text-anchor="middle" fill="#888780">Innermost = AI decision, outermost = user funds</text>

<!-- Layer 6: outermost - Vault standard -->
<rect x="40" y="60" width="600" height="590" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="60" y="85" fill="#444441">Layer 6: Vault standard</text>
<text class="ts" x="60" y="102" fill="#5F5E5A">ERC-4626 / ERC-7540</text>

<!-- Layer 5: Performance accountability -->
<rect x="60" y="115" width="560" height="510" rx="18" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="80" y="140" fill="#085041">Layer 5: Performance accountability</text>
<text class="ts" x="80" y="157" fill="#0F6E56">Staking, slashing, drawdown breakers</text>

<!-- Layer 4: Execution safety -->
<rect x="80" y="170" width="520" height="430" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="100" y="195" fill="#0C447C">Layer 4: Execution safety</text>
<text class="ts" x="100" y="212" fill="#185FA5">Simulation, MEV, revert monitoring</text>

<!-- Layer 3: Rate / velocity controls -->
<rect x="100" y="225" width="480" height="350" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="120" y="250" fill="#633806">Layer 3: Rate and velocity controls</text>
<text class="ts" x="120" y="267" fill="#854F0B">Max trades/epoch, cooldowns</text>

<!-- Layer 2: Decision verification -->
<rect x="120" y="280" width="440" height="270" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="140" y="305" fill="#712B13">Layer 2: Decision verification</text>
<text class="ts" x="140" y="322" fill="#993C1D">Multi-agent consensus, challenge period</text>

<!-- Layer 1: innermost - Policy cage -->
<rect x="140" y="340" width="400" height="185" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="160" y="365" fill="#3C3489">Layer 1: Policy cage</text>
<text class="ts" x="160" y="382" fill="#534AB7">Allowlisted actions, hard limits</text>

<!-- The AI agent core -->
<rect x="220" y="410" width="240" height="80" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="443" text-anchor="middle" dominant-baseline="central" fill="#444441">AI decision engine</text>
<text class="ts" x="340" y="465" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">LLM + ML models</text>

<!-- Legend -->
<rect x="470" y="642" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="490" y="652" fill="#5F5E5A">Traditional vault</text>
<rect x="470" y="628" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="490" y="638" fill="#534AB7">AI-specific layers</text>

</svg>